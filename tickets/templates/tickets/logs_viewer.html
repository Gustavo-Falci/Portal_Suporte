{% extends "tickets/base.html" %}
{% block content %}
<div class="container-fluid py-3">
  <div class="d-flex flex-wrap gap-2 align-items-center mb-2">
    <h5 class="mb-0 me-2">Logs em tempo real</h5>
    <select id="file-select" class="form-select form-select-sm" style="width:auto;min-width:200px">
      {% for nome in arquivos %}
        <option value="{{ nome }}" {% if nome == selecionado %}selected{% endif %}>{{ nome }}</option>
      {% endfor %}
    </select>
    <input id="filter-box" type="text" class="form-control form-control-sm"
           placeholder="filtrar..." style="width:220px">
    <div class="form-check ms-2">
      <input class="form-check-input" type="checkbox" id="autoscroll" checked>
      <label class="form-check-label" for="autoscroll">autoscroll</label>
    </div>
    <span id="status" class="badge bg-secondary ms-2">conectando…</span>
    <span id="hist-status" class="badge bg-secondary ms-2"></span>
  </div>

  <pre id="log-container"
       style="height:75vh;overflow:auto;background:#0d1117;color:#c9d1d9;
              padding:.75rem;border-radius:.375rem;font-size:.9rem;margin:0"></pre>
</div>

{{ selecionado|json_script:"sel-file" }}
{{ linhas|json_script:"linhas-iniciais" }}

<script nonce="{{ request.csp_nonce }}">
(function () {
  const container = document.getElementById("log-container");
  const filterBox = document.getElementById("filter-box");
  const autoscroll = document.getElementById("autoscroll");
  const statusEl = document.getElementById("status");
  const fileSelect = document.getElementById("file-select");

  const fname = JSON.parse(document.getElementById("sel-file").textContent);
  let pos = {{ pos }};

  function levelClass(text) {
    if (/\bERROR\b|\bCRITICAL\b/.test(text)) return "log-error";
    if (/\bWARNING\b/.test(text)) return "log-warn";
    return "";
  }

  function filtroAtual() {
    return filterBox.value.trim().toLowerCase();
  }

  function matchesFilter(text) {
    const q = filtroAtual();
    return !q || text.toLowerCase().includes(q);
  }

  // Marca-texto: envolve cada ocorrência do filtro em <mark>, montando os
  // nós manualmente (nunca innerHTML — linha de log é texto arbitrário).
  // Com filtro vazio, restaura o texto puro (remove marcas antigas).
  function aplicarDestaque(div, q) {
    const texto = div.textContent;
    if (!q) { div.textContent = texto; return; }
    const lower = texto.toLowerCase();
    div.textContent = "";
    let i = 0;
    while (true) {
      const idx = lower.indexOf(q, i);
      if (idx === -1) { div.appendChild(document.createTextNode(texto.slice(i))); break; }
      if (idx > i) div.appendChild(document.createTextNode(texto.slice(i, idx)));
      const mark = document.createElement("mark");
      mark.textContent = texto.slice(idx, idx + q.length);
      div.appendChild(mark);
      i = idx + q.length;
    }
  }

  function criarLinha(text) {
    const div = document.createElement("div");
    div.textContent = text;
    const cls = levelClass(text);
    if (cls) div.className = cls;
    const visivel = matchesFilter(text);
    div.style.display = visivel ? "" : "none";
    if (visivel) aplicarDestaque(div, filtroAtual());
    return div;
  }

  function appendLine(text) {
    container.appendChild(criarLinha(text));
    if (autoscroll.checked) container.scrollTop = container.scrollHeight;
  }

  JSON.parse(document.getElementById("linhas-iniciais").textContent).forEach(appendLine);

  const histStatus = document.getElementById("hist-status");
  let topCursor = { file: fname, offset: {{ top_offset }} };
  let carregandoHist = false;

  async function carregarHistorico() {
    if (carregandoHist || !topCursor) return;
    carregandoHist = true;
    histStatus.textContent = "carregando histórico…";
    try {
      const url = "history/?file=" + encodeURIComponent(topCursor.file) +
                  "&offset=" + topCursor.offset + "&n=500";
      const resp = await fetch(url);
      if (!resp.ok) { topCursor = null; histStatus.textContent = ""; return; }
      const dados = await resp.json();
      const alturaAntes = container.scrollHeight;
      const frag = document.createDocumentFragment();
      dados.lines.forEach(function (t) { frag.appendChild(criarLinha(t)); });
      container.insertBefore(frag, container.firstChild);
      container.scrollTop += container.scrollHeight - alturaAntes;  // não pula
      topCursor = dados.cursor;
      histStatus.textContent = topCursor ? "" : "início do histórico";
    } catch (e) {
      // erro de rede: mantém o cursor e tenta de novo no próximo scroll
      histStatus.textContent = "";
    } finally {
      carregandoHist = false;
    }
  }

  container.addEventListener("scroll", function () {
    if (container.scrollTop < 40) carregarHistorico();
  });

  filterBox.addEventListener("input", function () {
    const q = filtroAtual();
    container.childNodes.forEach(function (n) {
      if (n.textContent !== undefined) {
        const mostra = matchesFilter(n.textContent);
        n.style.display = mostra ? "" : "none";
        if (mostra) aplicarDestaque(n, q);
      }
    });
  });

  fileSelect.addEventListener("change", function () {
    window.location = "?file=" + encodeURIComponent(fileSelect.value);
  });

  let es = null;
  function connect() {
    if (es) es.close();
    es = new EventSource("stream/?file=" + encodeURIComponent(fname) + "&pos=" + pos);
    es.onopen = function () { statusEl.className = "badge bg-success ms-2"; statusEl.textContent = "ao vivo"; };
    es.onmessage = function (e) { appendLine(e.data); };
    es.addEventListener("pos", function (e) { pos = parseInt(e.data, 10) || pos; });
    es.addEventListener("rotated", function () { pos = 0; });
    es.onerror = function () {
      statusEl.className = "badge bg-warning text-dark ms-2";
      statusEl.textContent = "reconectando…";
      es.close();
      setTimeout(connect, 800);  // reconnect manual com o pos mais recente
    };
  }
  connect();
})();
</script>

<style nonce="{{ request.csp_nonce }}">
  #log-container .log-error { color: #ff7b72; }
  #log-container .log-warn  { color: #d29922; }
  #log-container mark {
    background: #ffd33d;
    color: #0d1117;
    padding: 0 1px;
    border-radius: 2px;
  }
</style>
{% endblock %}
